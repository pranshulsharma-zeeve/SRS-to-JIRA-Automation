name: Codex Task Runner

on:
  workflow_dispatch:
    inputs:
      jira_key:
        description: "Jira issue key"
        required: true
      task_description:
        description: "Task description"
        required: true

jobs:
  codex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Check OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is missing or empty"
            exit 1
          fi
          echo "OPENAI_API_KEY is present"

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Jira issue: ${{ github.event.inputs.jira_key }}
          
            Task:
            ${{ github.event.inputs.task_description }}
          
            Instructions:
            - Make only the minimum necessary code changes to complete the task.
            - Follow the existing project structure and coding style.
            - Do not refactor unrelated files.
            - If the task is ambiguous, choose the safest small implementation that matches the issue text.
            - Update tests if needed.
            - Summarize exactly what changed in codex-output.md.
          
            Make the requested code changes.
            Keep the change focused and minimal.
            Then summarize what changed.
          output-file: codex-output.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: '["--full-auto"]'
          
      - name: Create branch and commit changes
        id: commit_changes
        run: |
          BRANCH="feature/${{ github.event.inputs.jira_key }}-${{ github.run_number }}"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git restore --staged codex-output.md || true
          rm -f codex-output.md
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Codex: ${{ github.event.inputs.jira_key }}"
          git push origin "$BRANCH"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.commit_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.commit_changes.outputs.branch_name }}" \
            --title "Codex: ${{ github.event.inputs.jira_key }}" \
            --body "Auto-generated by Codex for Jira issue ${{ github.event.inputs.jira_key }}."


      - name: Show Codex output
        if: always()
        run: |
          if [ -f codex-output.md ]; then
            cat codex-output.md
          else
            echo "codex-output.md not found"
          fi

      - name: Show git diff
        if: always()
        run: |
          git status
          git diff --stat
          git diff
